<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="calc.js" defer></script>
    <title>Calculator</title>
</head>
<body>

    <div id="calculator"> 
        <div class="display"></div>

        <div class="row-top" id="row-1">
            <div class="clear btn">AC</div>
            <div class="delete btn">DEL</div>
        </div>

        <div class="row" id="row-2">
            <div class="seven keypad btn digit">7</div>
            <div class="eight keypad btn digit">8</div>
            <div class="nine keypad btn digit">9</div>
            <div class="divide keypad btn op">÷</div>
        </div>
        
        <div class="row" id="row-3">
            <div class="four keypad btn digit">4</div>
            <div class="five keypad btn digit">5</div>
            <div class="six keypad btn digit">6</div>
            <div class="multiply keypad btn op">×</div>
        </div>

        <div class="row" id="row-4">
            <div class="one keypad btn digit">1</div>
            <div class="two keypad btn digit">2</div>
            <div class="three keypad btn digit">3</div>
            <div class="subtract keypad btn op">-</div>
        </div>
        
        <div class="row" id="row-5">
            <div class="dot keypad btn digit">.</div>
            <div class="zero keypad btn digit">0</div>
            <div class="equals keypad btn op">=</div>
            <div class="add keypad btn op">+</div>
        </div>
    </div>

</body>
</html>
