<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="calc.js" defer></script>
    <title>Calculator</title>
</head>
<body>

    <div id="calculator"> 
        <div class="display"></div>

        <div class="row-top" id="row-1">
            <div class="clear">AC</div>
            <div class="delete">DEL</div>
        </div>

        <div class="row" id="row-2">
            <div class="seven keypad">7</div>
            <div class="eight keypad">8</div>
            <div class="nine keypad">9</div>
            <div class="divide keypad">÷</div>
        </div>
        
        <div class="row" id="row-3">
            <div class="four keypad">4</div>
            <div class="five keypad">5</div>
            <div class="six keypad">6</div>
            <div class="multiply keypad">×</div>
        </div>

        <div class="row" id="row-4">
            <div class="one keypad">1</div>
            <div class="two keypad">2</div>
            <div class="three keypad">3</div>
            <div class="subtract keypad">-</div>
        </div>
        
        <div class="row" id="row-5">
            <div class="dot keypad">.</div>
            <div class="zero keypad">0</div>
            <div class="equals keypad">=</div>
            <div class="add keypad">+</div>
        </div>
    </div>

</body>
</html>
